<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CareVoy — Sign In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8FAFC; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 420px; border: 1px solid #E2E8F0; box-shadow: 0 4px 24px rgba(5,13,31,0.06); }
    h1 { font-size: 26px; font-weight: 700; color: #050D1F; margin-bottom: 6px; }
    .subtitle { color: #6B7280; font-size: 14px; margin-bottom: 32px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #050D1F; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; margin-top: 16px; }
    input { width: 100%; padding: 14px 16px; border: 1px solid #E2E8F0; border-radius: 12px; font-size: 15px; color: #050D1F; background: #F8FAFC; outline: none; }
    input:focus { border-color: #00C2A8; background: white; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 48px; }
    .pw-eye { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #6B7280; font-size: 16px; padding: 0; width: auto; }
    .submit { width: 100%; padding: 16px; background: #050D1F; color: #00C2A8; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 24px; font-family: inherit; }
    .submit:hover { opacity: 0.9; }
    .submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: #EF4444; font-size: 13px; margin-top: 10px; display: none; }
    .footer { text-align: center; margin-top: 24px; color: #6B7280; font-size: 13px; }
    .footer a { color: #050D1F; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in</h1>
    <p class="subtitle">CareVoy partner &amp; admin access</p>
    <label>Email</label>
    <input type="email" id="email" placeholder="you@facility.com" />
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="Password" />
      <button class="pw-eye" onclick="togglePw()" type="button" id="eyeBtn">show</button>
    </div>
    <div id="error" class="error"></div>
    <button class="submit" id="btn" onclick="signIn()">Sign In</button>
    <div class="footer">Patient? <a href="https://apps.apple.com/us/app/carevoy/id6768714735">Download the app</a></div>
  </div>
  <script>
    const URL = 'https://byflpckbjjumxxjxoplk.supabase.co';
    const KEY = 'sb_publishable_mwR5uT4W3C2M-K5LbBag4g_GdN0plrT';

    function togglePw() {
      var i = document.getElementById('password');
      var b = document.getElementById('eyeBtn');
      if (i.type === 'password') { i.type = 'text'; b.textContent = 'hide'; }
      else { i.type = 'password'; b.textContent = 'show'; }
    }

    async function signIn() {
      var email = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var err = document.getElementById('error');
      var btn = document.getElementById('btn');
      err.style.display = 'none';
      if (!email || !password) { err.textContent = 'Enter your email and password.'; err.style.display = 'block'; return; }
      btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        var r = await fetch(URL + '/auth/v1/token?grant_type=password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': KEY },
          body: JSON.stringify({ email: email, password: password })
        });
        var d = await r.json();
        if (!r.ok) throw new Error(d.error_description || d.message || 'Login failed');
        var token = d.access_token;
        var uid = d.user.id;
        var h = { 'apikey': KEY, 'Authorization': 'Bearer ' + token };
        var sr = await fetch(URL + '/rest/v1/staff?id=eq.' + uid + '&select=role', { headers: h });
        var sd = await sr.json();
        var role = sd[0] && sd[0].role;
        var cr = await fetch(URL + '/rest/v1/hospital_coordinators?id=eq.' + uid + '&select=id', { headers: h });
        var cd = await cr.json();
        if (role === 'admin') {
          sessionStorage.setItem('cv_admin_token', token);
          sessionStorage.setItem('cv_admin_uid', uid);
          window.location.href = '/admin.html';
        } else if (role === 'nemt') window.location.href = '/driver';
        else if (cd[0]) window.location.href = '/coordinator';
        else throw new Error('No partner role found. Contact your CareVoy admin.');
      } catch(e) {
        err.textContent = e.message; err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    }
    document.addEventListener('keydown', function(e) { if (e.key === 'Enter') signIn(); });
  </script>
</body>
</html>
