<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CareVoy Partner Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F8FAFC; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 420px; border: 1px solid #E2E8F0; box-shadow: 0 4px 24px rgba(5,13,31,0.06); }
    .brand { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
    .logo { width: 44px; height: 44px; background: #050D1F; border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 22px; font-weight: 800; }
    .brand-name { font-size: 20px; font-weight: 700; color: #050D1F; }
    .brand-sub { font-size: 12px; color: #00C2A8; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
    h1 { font-size: 24px; font-weight: 700; color: #050D1F; margin-bottom: 6px; }
    .subtitle { color: #6B7280; font-size: 14px; margin-bottom: 28px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #050D1F; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; margin-top: 16px; }
    input { width: 100%; padding: 14px 16px; border: 1px solid #E2E8F0; border-radius: 12px; font-size: 15px; color: #050D1F; background: #F8FAFC; outline: none; }
    input:focus { border-color: #00C2A8; background: white; }
    button { width: 100%; padding: 16px; background: #050D1F; color: #00C2A8; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 24px; letter-spacing: 0.3px; }
    button:hover { opacity: 0.9; }
    .error { color: #EF4444; font-size: 13px; margin-top: 10px; }
    .footer { text-align: center; margin-top: 24px; color: #6B7280; font-size: 13px; }
    .footer a { color: #050D1F; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo">C</div>
      <div>
        <div class="brand-name">CareVoy</div>
        <div class="brand-sub">Partner Portal</div>
      </div>
    </div>
    <h1>Partner sign-in</h1>
    <p class="subtitle">For NEMT drivers, facility coordinators, and CareVoy admins.</p>
    <label>Work email</label>
    <input type="email" id="email" placeholder="you@facility.com" />
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" />
    <div id="error" class="error" style="display:none"></div>
    <button onclick="signIn()">Sign In</button>
    <div class="footer">Patient? <a href="https://apps.apple.com/us/app/carevoy/id6768714735">Download the app</a></div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script>
    const { createClient } = supabase;
    const client = createClient(
      'https://byflpckbjjumxxjxoplk.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5ZmxwY2tiang1dW14eGpvcGxrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDU0NDA5MjAsImV4cCI6MjA2MTAxNjkyMH0.hFmKsWXmNhNVD6O_XEqonUbM_WUqW1MjHWVH-EcJaWk'
    );
    async function signIn() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errEl = document.getElementById('error');
      errEl.style.display = 'none';
      if (!email || !password) { errEl.textContent = 'Enter your email and password.'; errEl.style.display = 'block'; return; }
      const { data, error } = await client.auth.signInWithPassword({ email, password });
      if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; return; }
      const uid = data.user?.id;
      const [staffRes, coordRes] = await Promise.all([
        client.from('staff').select('role').eq('id', uid).maybeSingle(),
        client.from('hospital_coordinators').select('id').eq('id', uid).maybeSingle(),
      ]);
      if (staffRes.data?.role === 'admin') window.location.href = '/admin';
      else if (staffRes.data?.role === 'nemt') window.location.href = '/driver';
      else if (coordRes.data) window.location.href = '/coordinator';
      else { errEl.textContent = 'No partner role found. Contact your CareVoy admin.'; errEl.style.display = 'block'; }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') signIn(); });
  </script>
</body>
</html>
