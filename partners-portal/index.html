<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CareVoy — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F0F4F8; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: white; border-radius: 20px; padding: 48px 40px; width: 100%; max-width: 420px; border: 1px solid #E2E8F0; box-shadow: 0 4px 24px rgba(5,13,31,0.06); }
    .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
    .brand-text { color: #050D1F; font-size: 18px; font-weight: 700; letter-spacing: -0.2px; }
    .brand-sub { color: #00C2A8; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
    h1 { font-size: 24px; font-weight: 700; color: #050D1F; margin-bottom: 6px; }
    .subtitle { color: #6B7280; font-size: 14px; margin-bottom: 28px; line-height: 1.5; }
    label { display: block; font-size: 12px; font-weight: 700; color: #050D1F; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; margin-top: 16px; }
    input { width: 100%; padding: 14px 16px; border: 1px solid #E2E8F0; border-radius: 12px; font-size: 15px; color: #050D1F; background: #F8FAFC; outline: none; font-family: inherit; }
    input:focus { border-color: #00C2A8; background: white; }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 56px; }
    .pw-eye { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #6B7280; font-size: 13px; font-weight: 600; font-family: inherit; padding: 4px 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .pw-eye:hover { color: #050D1F; }
    .submit { width: 100%; padding: 16px; background: #050D1F; color: #00C2A8; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 24px; font-family: inherit; letter-spacing: 0.2px; }
    .submit:hover { opacity: 0.9; }
    .submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .error { color: #EF4444; font-size: 13px; margin-top: 10px; display: none; background: #fff5f5; border: 1px solid #fecaca; border-radius: 8px; padding: 10px 14px; }
    .footer { text-align: center; margin-top: 24px; color: #6B7280; font-size: 13px; }
    .footer a { color: #050D1F; font-weight: 600; text-decoration: none; }
    .footer a:hover { color: #00C2A8; }
    @media (max-width: 480px) { .card { padding: 32px 24px; margin: 16px; border-radius: 16px; } }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDI0IDEwMjQiPjxyZWN0IHdpZHRoPSIxMDI0IiBoZWlnaHQ9IjEwMjQiIGZpbGw9IiMwNjBEMUYiLz48ZyB0cmFuc2Zvcm09InRyYW5zbGF0ZSgzMjAuMzQgNjkxLjk1KSBzY2FsZSgwLjUwOTEgLTAuNTA5MSkiPjxwYXRoIGQ9Ik0zODMgNzEyUTUxNSA3MTIgNjA1LjAgNjQxLjVRNjk1IDU3MSA3MjEgNDUwSDUxMFE0OTEgNDkwIDQ1Ny41IDUxMS4wUTQyNCA1MzIgMzgwIDUzMlEzMTIgNTMyIDI3MS41IDQ4My41UTIzMSA0MzUgMjMxIDM1NFEyMzEgMjcyIDI3MS41IDIyMy41UTMxMiAxNzUgMzgwIDE3NVE0MjQgMTc1IDQ1Ny41IDE5Ni4wUTQ5MSAyMTcgNTEwIDI1N0g3MjFRNjk1IDEzNiA2MDUuMCA2NS41UTUxNSAtNSAzODMgLTVRMjc5IC01IDE5OS4wIDQwLjVRMTE5IDg2IDc1LjUgMTY3LjVRMzIgMjQ5IDMyIDM1NFEzMiA0NTggNzUuNSA1MzkuNVExMTkgNjIxIDE5OS4wIDY2Ni41UTI3OSA3MTIgMzgzIDcxMloiIGZpbGw9IiNGRkZGRkYiLz48L2c+PHBhdGggZD0iTSA3NTguMjAgNTU1LjQxIEEgMjUwIDI1MCAwIDEgMSA3NTguMjAgNDY4LjU5IiBmaWxsPSJub25lIiBzdHJva2U9IiMwMEMyQTgiIHN0cm9rZS13aWR0aD0iMjIiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIvPjxjaXJjbGUgY3g9Ijc1OC4yMCIgY3k9IjU1NS40MSIgcj0iMTciIGZpbGw9IiNGNUE2MjMiLz48Y2lyY2xlIGN4PSI3NTguMjAiIGN5PSI0NjguNTkiIHI9IjE3IiBmaWxsPSIjRjVBNjIzIi8+PC9zdmc+" width="32" height="32" style="border-radius:7px;flex-shrink:0">
      <div>
        <div class="brand-text">CareVoy</div>
        <div class="brand-sub">Partner Portal</div>
      </div>
    </div>
    <h1>Sign in to your dashboard</h1>
    <p class="subtitle">For NEMT drivers, hospital coordinators, and CareVoy admins. Patients should use the CareVoy mobile app instead.</p>
    <label>Work email</label>
    <input type="email" id="email" placeholder="you@nemtcompany.com" autocomplete="email">
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      <button class="pw-eye" onclick="togglePw()" type="button" id="eyeBtn">SHOW</button>
    </div>
    <div id="error" class="error"></div>
    <button class="submit" id="btn" onclick="signIn()">Sign In</button>
    <div class="footer">Are you a patient? <a href="https://apps.apple.com/us/app/carevoy/id6768714735" target="_blank">Download CareVoy from the App Store or Google Play.</a></div>
  </div>

  <script>
    var SUPA = 'https://byflpckbjjumxxjxoplk.supabase.co';
    var KEY  = 'sb_publishable_mwR5uT4W3C2M-K5LbBag4g_GdN0plrT';

    function togglePw() {
      var i = document.getElementById('password');
      var b = document.getElementById('eyeBtn');
      if (i.type === 'password') { i.type = 'text'; b.textContent = 'HIDE'; }
      else { i.type = 'password'; b.textContent = 'SHOW'; }
    }

    async function signIn() {
      var email    = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var errEl    = document.getElementById('error');
      var btn      = document.getElementById('btn');
      errEl.style.display = 'none';

      if (!email || !password) {
        errEl.textContent = 'Please enter your email and password.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        // Authenticate
        var authRes = await fetch(SUPA + '/auth/v1/token?grant_type=password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': KEY },
          body: JSON.stringify({ email: email, password: password })
        });
        var authData = await authRes.json();
        if (!authRes.ok) throw new Error(authData.error_description || authData.message || 'Login failed. Check your email and password.');

        var token = authData.access_token;
        var uid   = authData.user.id;
        var H     = { 'apikey': KEY, 'Authorization': 'Bearer ' + token };

        // Check staff role
        var staffRes  = await fetch(SUPA + '/rest/v1/staff?id=eq.' + uid + '&select=role', { headers: H });
        var staffData = await staffRes.json();
        var role = staffData[0] && staffData[0].role;

        if (role === 'admin') {
          // Admin: save token and go to admin dashboard
          sessionStorage.setItem('cv_admin_token', token);
          sessionStorage.setItem('cv_admin_uid',   uid);
          window.location.href = '/admin.html';
          return;
        }

        if (role === 'nemt') {
          // NEMT driver: save token and go to driver portal
          sessionStorage.setItem('cv_nemt_token', token);
          sessionStorage.setItem('cv_nemt_uid',   uid);
          window.location.href = '/driver';
          return;
        }

        if (role === 'coordinator') {
          // Staff coordinator: save token and go to coordinator portal
          sessionStorage.setItem('cv_coord_token', token);
          sessionStorage.setItem('cv_coord_uid',   uid);
          window.location.href = '/coordinator';
          return;
        }

        // Check hospital_coordinators table (invited coordinators not yet in staff)
        var coordRes  = await fetch(SUPA + '/rest/v1/hospital_coordinators?id=eq.' + uid + '&select=id', { headers: H });
        var coordData = await coordRes.json();
        if (coordData && coordData[0]) {
          sessionStorage.setItem('cv_coord_token', token);
          sessionStorage.setItem('cv_coord_uid',   uid);
          window.location.href = '/coordinator';
          return;
        }

        throw new Error('No role found for this account. Contact your CareVoy admin.');

      } catch(e) {
        errEl.textContent   = e.message;
        errEl.style.display = 'block';
        btn.disabled        = false;
        btn.textContent     = 'Sign In';
      }
    }

    document.addEventListener('keydown', function(e) { if (e.key === 'Enter') signIn(); });
  </script>
</body>
</html>
